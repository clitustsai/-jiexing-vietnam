# ============================================================
# Nginx config cho JIE XING VIETNAM
# Đặt tại: /etc/nginx/sites-available/jiexing
# Symlink: ln -s /etc/nginx/sites-available/jiexing /etc/nginx/sites-enabled/
# ============================================================

# Chuyển HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name jiexingvietnam.com www.jiexingvietnam.com;
    return 301 https://$host$request_uri;
}

# HTTPS chính
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jiexingvietnam.com www.jiexingvietnam.com;

    root /var/www/jiexing;
    index index.html;

    # ---- SSL (Let's Encrypt tự điền sau khi chạy certbot) ----
    ssl_certificate     /etc/letsencrypt/live/jiexingvietnam.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jiexingvietnam.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ---- SECURITY HEADERS ----
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; frame-src https://www.google.com; connect-src 'self'" always;

    # ---- ẨN THÔNG TIN SERVER ----
    server_tokens off;

    # ---- CHẶN TRUY CẬP FILE NHẠY CẢM ----
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~* \.(git|env|log|sql|bak|zip|tar|gz)$ {
        deny all;
        return 404;
    }

    # ---- GIỚI HẠN REQUEST SIZE ----
    client_max_body_size 10M;

    # ---- RATE LIMITING (chống DDoS cơ bản) ----
    limit_req_zone $binary_remote_addr zone=web:10m rate=30r/s;
    limit_req zone=web burst=60 nodelay;

    # ---- ROUTING ----
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # ---- CACHE TĨNH ----
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # ---- GZIP NÉN ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # ---- LOG ----
    access_log /var/log/nginx/jiexing_access.log;
    error_log  /var/log/nginx/jiexing_error.log;
}
